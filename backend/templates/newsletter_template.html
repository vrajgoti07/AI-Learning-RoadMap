<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b101e;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #131a2a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #263147;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header .logo-text {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .header .gradient-text {
            background: linear-gradient(to right, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content {
            padding: 40px 30px;
            background-color: #131a2a;
        }

        .content h2 {
            color: #f8fafc;
            font-size: 20px;
            margin-top: 0;
            font-weight: 600;
        }

        .content p,
        .content .message-body {
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .content .message-body h1,
        .content .message-body h2,
        .content .message-body h3 {
            color: #f8fafc;
        }

        .content a {
            color: #6366f1;
            text-decoration: none;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #4F46E5;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .footer {
            background-color: #0b101e;
            border-top: 1px solid #263147;
            padding: 30px;
            text-align: center;
        }

        .footer p {
            color: #64748b;
            font-size: 13px;
            margin: 5px 0;
        }

        .footer .brand {
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .footer a {
            color: #64748b;
            text-decoration: underline;
        }

        @media only screen and (max-width: 600px) {
            .container {
                margin: 20px 10px;
                width: auto;
            }

            .content {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <img src="{{logo_url}}" alt="PathFinder AI Logo"
                style="width: 70px; height: 70px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <div class="logo-text" style="font-size: 18px; margin-bottom: 15px;">PathFinder <span
                    class="gradient-text">AI</span></div>
            <h1>{{subject}}</h1>
        </div>

        <!-- Main Content -->
        <div class="content">
            <div class="message-body">
                {{content | safe}}
            </div>

            <center>
                <a href="http://localhost:5173/dashboard" class="button">Visit Your Dashboard</a>
            </center>
        </div>

        <!-- Footer Section -->
        <div class="footer">
            <p class="brand">PathFinder AI</p>
            <p>© {{year}} PathFinder AI. All rights reserved.</p>
            <p>You are receiving this because you subscribed to our newsletter at <a
                    href="http://localhost:5173">pathfinder-ai.com</a></p>
            <p style="margin-top: 20px;"><a href="#">Unsubscribe</a></p>
        </div>
    </div>
</body>

</html>
