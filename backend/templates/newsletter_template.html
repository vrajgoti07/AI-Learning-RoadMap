<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .header {
            background-color: #0B0914;
            padding: 30px;
            text-align: center;
        }

        .logo-text {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .gradient-text {
            background: linear-gradient(to right, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content {
            padding: 40px 30px;
        }

        .footer {
            background-color: #f9fafb;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
            border-top: 1px solid #edf2f7;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #4F46E5;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
        }

        h1 {
            color: #111827;
            font-size: 22px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo-text">PathFinder <span class="gradient-text">AI</span></div>
        </div>
        <div class="content">
            <h1>{{subject}}</h1>
            <div class="message-body">
                {{content | safe}}
            </div>
            <center>
                <a href="http://localhost:5173/dashboard" class="button">Visit Your Dashboard</a>
            </center>
        </div>
        <div class="footer">
            <p>© {{year}} PathFinder AI. All rights reserved.</p>
            <p>You are receiving this because you subscribed to our newsletter at <a
                    href="http://localhost:5173">pathfinder-ai.com</a></p>
            <p><a href="#">Unsubscribe</a></p>
        </div>
    </div>
</body>

</html>
